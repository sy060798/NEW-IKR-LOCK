<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IKCR LOCK</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:20px;}
h2{text-align:center;}

button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
.blue{background:#3498db;color:white;}
.orange{background:#f39c12;color:white;}
.red{background:#e74c3c;color:white;}

.table-wrap{overflow:auto;background:#222;border-radius:10px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:6px;font-size:12px;text-align:center;border-bottom:1px solid #444;}
thead th{background:#8e44ad;}

input,select{
  background:#111;color:white;border:1px solid #555;padding:6px;border-radius:6px;
}
</style>
</head>

<body>

<h2>🔒 IKCR LOCK</h2>

<div>
  <button class="blue" onclick="exportExcel()">⬇ Download</button>
  <button class="orange" onclick="triggerUpload()">⬆ Upload</button>
  <button class="red" onclick="hapusTerpilih()">🗑 Hapus</button>
</div>

<input type="file" id="upload" hidden>

<div class="table-wrap">
<table id="tableData">
<thead>
<tr>
  <th>No</th>
  <th><input type="checkbox" id="checkAll"></th>

  <th>Region</th>
  <th>Tahun</th>
  <th>WO Type</th>
  <th>Bulan</th>

  <th>Jumlah WO</th>
  <th>WO Approved</th>

  <th>Amount</th>
  <th>FS Amount</th>
  <th>Selisih</th>

  <th>Remarks</th>
  <th>No Invoice</th>
  <th>Note</th>
  <th>Done Summary</th>

  <th>Aksi</th>
</tr>
</thead>

<tbody></tbody>
</table>
</div>

<script src="../js/ikrlock.js"></script>
</body>
</html>
