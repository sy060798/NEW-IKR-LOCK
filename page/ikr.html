<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IKCR LOCK</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f0f0f;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
  padding:15px;
}

h2{
  text-align:center;
  margin-bottom:15px;
  color:#f1c40f;
}

/* MENU */
.menu{
  display:flex;
  gap:8px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.menu button{
  background:#222;
  color:#fff;
  border:none;
  padding:7px 14px;
  border-radius:5px;
  cursor:pointer;
}

.menu button.active{
  background:#8e44ad;
}

/* BUTTON */
.btn-group{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

button{
  border:none;
  padding:7px 12px;
  border-radius:5px;
  color:#fff;
  cursor:pointer;
}

.blue{background:#3498db;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.green{background:#2ecc71;}
.purple{background:#8e44ad;}

/* TABLE */
.table-wrap{
  overflow:auto;
  border:1px solid #444;
}

table{
  width:100%;
  min-width:1400px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #333;
  padding:6px;
  font-size:12px;
  text-align:center;
  white-space:nowrap;
}

thead th{
  background:#8e44ad;
  position:sticky;
  top:0;
}

tbody tr:nth-child(even){
  background:#161616;
}

tbody tr:hover{
  background:#222;
}

/* TAB */
.tab{
  display:none;
}

.tab.active{
  display:block;
}

/* POPUP */
#popupWO{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  z-index:9999;
}

.popup-box{
  width:90%;
  max-width:900px;
  height:520px;
  background:#111;
  margin:30px auto;
  padding:15px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.popup-body{
  flex:1;
  overflow:auto;
  margin-top:10px;
}

.popup-action{
  margin-top:10px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

/* LOADING */
#loadingBox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:99999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.loader{
  width:50px;
  height:50px;
  border:5px solid #333;
  border-top:5px solid #8e44ad;
  border-radius:50%;
  animation:putar 1s linear infinite;
}

.loadingText{
  margin-top:12px;
  font-size:14px;
}

@keyframes putar{
  100%{transform:rotate(360deg);}
}

/* MOBILE */
@media(max-width:768px){

  body{
    padding:10px;
  }

  th,td{
    font-size:11px;
    padding:5px;
  }

  .popup-box{
    width:96%;
    height:90vh;
  }

}
</style>
</head>
<body>

<div id="loadingBox"></div>

<h2>🔒 IKCR LOCK</h2>

<!-- MENU -->
<div class="menu">
  <button class="active" onclick="showTab('data',this)">Data</button>
  <button onclick="showTab('pivot',this)">Pivot</button>
</div>

<!-- BUTTON -->
<div class="btn-group">
  <button class="blue" onclick="download()">Download</button>
  <button class="orange" onclick="triggerUpload()">Upload</button>
  <button class="red" onclick="hapusData()">Hapus</button>
  <button class="purple" onclick="triggerUploadIMS()">Upload IMS</button>
  <button class="green" onclick="uploadServer()">Upload Server</button>

  <input type="file" id="file" hidden accept=".xlsx,.xls">
  <input type="file" id="fileIMS" hidden accept=".xlsx,.xls">
</div>

<!-- DATA -->
<div id="data" class="tab active">
<div class="table-wrap">
<table id="tbl">
<thead>
<tr>
<th>No</th>
<th><input type="checkbox" id="checkAll"></th>
<th>Region</th>
<th>Tahun</th>
<th>WO Type</th>
<th>Bulan</th>
<th>Jumlah WO</th>
<th>WO Approved</th>
<th>Amount</th>
<th>FS Amount</th>
<th>Selisih</th>
<th>Remark</th>
<th>No Invoice</th>
<th>Note</th>
<th>Done</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- PIVOT -->
<div id="pivot" class="tab">
<canvas id="chart"></canvas>
</div>

<!-- POPUP -->
<div id="popupWO">
<div class="popup-box">

<h3>Detail WO</h3>

<div class="popup-body">
<table id="tblDetail">
<thead>
<tr>
<th>WO</th>
<th>REF</th>
<th>QUO</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="popup-action">
<button class="blue" onclick="downloadDetail()">Download</button>
<button style="background:#555" onclick="closePopup()">Close</button>
</div>

</div>
</div>

<script src="ikrlock.js"></script>

</body>
</html>
