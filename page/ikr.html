<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IKCR LOCK</title>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#0f0f0f;color:#fff;padding:20px}
h2{text-align:center}

/* ===== MENU ===== */
.menu{display:flex;gap:10px;margin-bottom:15px}
.menu button{
  background:#2c2c2c;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer
}
.menu button.active{background:#8e44ad}

/* ===== BUTTON ===== */
.btn-group{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:15px
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer
}

.blue{background:#3498db;color:#fff}
.orange{background:#f39c12;color:#fff}
.red{background:#e74c3c;color:#fff}
.green{background:#2ecc71;color:#fff}
.purple{background:#8e44ad;color:#fff}

/* ===== TABLE WRAP ===== */
.table-wrap{
  overflow:auto;
  max-height:500px;
  background:#1c1c1c
}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
  min-width:1200px;
  border:1px solid #555;
}

th,td{
  padding:6px;
  border:1px solid #444;
  font-size:12px;
  text-align:center;
}

thead{background:#8e44ad}

tr:hover{
  background:#2a2a2a;
}

/* ===== POPUP ===== */
#popupWO table{
  border:1px solid #777;
}

#popupWO table th,
#popupWO table td{
  font-size:12px;
  padding:6px;
  border:1px solid #555;
}

#popupWO button{
  margin-right:8px;
}

#tblDetail thead th{
  position:sticky;
  top:0;
  background:#8e44ad;
  z-index:2;
}

/* ===== TAB ===== */
.tab{display:none}
.tab.active{display:block}
</style>
</head>

<body>

<!-- ===== POPUP ===== -->
<div id="popupWO" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
z-index:9999;">

<div style="
background:#111;
padding:15px;
width:85%;
max-width:650px;
height:420px;
margin:60px auto;
border-radius:10px;
color:#fff;
display:flex;
flex-direction:column;">

<h3 style="margin:0">Detail WO</h3>

<div style="overflow:auto;flex:1;margin-top:10px">

<table width="100%" id="tblDetail" style="border-collapse:collapse">
<thead>
<tr>
<th>WO</th>
<th>Ref</th>
<th>Quotation</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div style="
display:flex;
gap:8px;
margin-top:10px;
justify-content:flex-end;">

<button onclick="downloadDetail()" style="padding:6px 10px;font-size:12px">
Download
</button>

<button onclick="editDetail()" style="padding:6px 10px;font-size:12px">
Edit
</button>

<button onclick="closePopup()" style="
padding:6px 10px;
font-size:12px;
background:#333;
color:#fff;">
Cancel
</button>

</div>
</div>
</div>

<h2>🔒 IKCR LOCK</h2>

<!-- ===== MENU ===== -->
<div class="menu">
  <button onclick="showTab('data',this)" class="active">Data</button>
  <button onclick="showTab('pivot',this)">Pivot</button>
</div>

<!-- ===== BUTTON ===== -->
<div class="btn-group">
  <button class="blue" onclick="download()">Download</button>
  <button class="orange" onclick="triggerUpload()">Upload</button>
  <button class="red" onclick="hapusData()">Hapus</button>

  <!-- 🔥 DIGANTI DARI PIVOT MENJADI UPLD IMS -->
  <button class="purple" onclick="triggerUploadIMS()">Upld IMS</button>

  <button class="green" onclick="uploadServer()">Upload Server</button>

  <!-- FILE BIASA -->
  <input type="file" id="file" hidden accept=".xlsx,.xls">

  <!-- FILE IMS -->
  <input type="file" id="fileIMS" hidden accept=".xlsx,.xls">
</div>

<!-- ===== DATA ===== -->
<div id="data" class="tab active">
<div class="table-wrap">
<table id="tbl">

<thead>
<tr>
<th>No</th>
<th><input type="checkbox" id="checkAll"></th>
<th>Region</th>
<th>Tahun</th>
<th>WO Type</th>
<th>Bulan</th>
<th>Jumlah WO</th>
<th>WO Approved</th>
<th>Amount</th>
<th>FS Amount</th>
<th>Selisih</th>
<th>Remark</th>
<th>No Invoice</th>
<th>Note</th>
<th>Done</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>
</div>

<!-- ===== PIVOT ===== -->
<div id="pivot" class="tab">
  <canvas id="chart"></canvas>
</div>

<!-- ===== JS ===== -->
<script src="../js/ikrlock.js"></script>

</body>
</html>
