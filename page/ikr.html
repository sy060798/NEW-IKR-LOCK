<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEW IKR LOCK SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#0e0e0e;
  color:#fff;
  padding:15px;
}

h1{
  text-align:center;
  margin-bottom:15px;
}

/* MENU */
.menu{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.menu button{
  background:#222;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.menu button.active{
  background:#8e44ad;
}

/* TOOLBAR */
.toolbar{
  display:none;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.toolbar.active{
  display:flex;
}

button{
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  color:#fff;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.red{background:#e74c3c;}
.orange{background:#f39c12;}
.gray{background:#555;}

/* TAB */
.tab{display:none;}
.tab.active{display:block;}

/* TABLE */
.wrap{
  overflow:auto;
  background:#171717;
  border-radius:10px;
  max-height:520px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1400px;
}

th,td{
  border:1px solid #333;
  padding:6px;
  font-size:12px;
  text-align:center;
}

th{
  background:#8e44ad;
  position:sticky;
  top:0;
}

/* CLICK */
.click{
  color:#00eaff;
  cursor:pointer;
  font-weight:bold;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  z-index:9999;
}

.popup-box{
  width:92%;
  max-width:900px;
  height:85vh;
  margin:30px auto;
  background:#111;
  padding:15px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.popup-body{
  flex:1;
  overflow:auto;
}

.popup-action{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>NEW IKR LOCK SYSTEM</h1>

<!-- MENU -->
<div class="menu">

  <button class="active" onclick="openTab('ikr',this)">DATA IKR LOCK</button>
  <button onclick="openTab('ims',this)">DATA IMS</button>
  <button onclick="openTab('pivot',this)">PIVOT</button>
  <button onclick="openTab('status',this)">STATUS</button>

  <button class="green" onclick="uploadServerAll()">UPLOAD SERVER SEMUA DATA</button>

</div>

<!-- ================= TOOLBAR IKR ================= -->
<div id="toolbar-ikr" class="toolbar active">
  <button class="blue" onclick="downloadIKR()">DOWNLOAD EXCEL</button>
  <input type="file" id="fileIKR" hidden>
  <button class="orange" onclick="fileIKR.click()">UPLOAD DATA</button>
  <button class="red" onclick="hapusIKR()">HAPUS</button>
</div>

<!-- ================= TOOLBAR IMS ================= -->
<div id="toolbar-ims" class="toolbar">
  <button class="blue" onclick="downloadIMS()">DOWNLOAD EXCEL</button>
  <input type="file" id="fileIMS" hidden>
  <button class="orange" onclick="fileIMS.click()">UPLOAD IMS</button>
  <button class="red" onclick="hapusIMS()">HAPUS</button>

  <!-- SEARCH -->
  <input type="text" placeholder="Pra Invoice Number">
  <input type="text" placeholder="Invoice Number">
  <input type="text" placeholder="Region">
</div>

<!-- ================= TOOLBAR PIVOT ================= -->
<div id="toolbar-pivot" class="toolbar">
  <button class="green" onclick="generatePivot()">REFRESH PIVOT</button>
</div>

<!-- ================= TOOLBAR STATUS ================= -->
<div id="toolbar-status" class="toolbar">
  <button class="green" onclick="generateStatus()">REFRESH STATUS</button>
  <button class="blue" onclick="downloadStatus()">DOWNLOAD STATUS</button>
</div>

<!-- ================= TAB IKR ================= -->
<div id="tab-ikr" class="tab active">
<div class="wrap">
<table id="tblIKR">
<thead>
<tr>
<th>No</th>
<th><input type="checkbox" id="checkIKR"></th>
<th>Region</th>
<th>Tahun</th>
<th>WO Type</th>
<th>Bulan</th>
<th>Jumlah WO</th>
<th>WO Approved</th>
<th>Amount</th>
<th>FS Amount</th>
<th>Remark</th>
<th>No Invoice</th>
<th>Note</th>
<th>Done</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- ================= TAB IMS ================= -->
<div id="tab-ims" class="tab">
<div class="wrap">
<table id="tblIMS">
<thead>
<tr>
<th>No</th>
<th><input type="checkbox"></th>
<th>City</th>
<th>Pra Invoice Number</th>
<th>Invoice Number</th>
<th>Jumlah WO</th>
<th>Job Name</th>
<th>Invoice Total</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- ================= TAB PIVOT ================= -->
<div id="tab-pivot" class="tab">
<div class="wrap" style="padding:15px">
<canvas id="chartPivot"></canvas>
</div>
</div>

<!-- ================= TAB STATUS ================= -->
<div id="tab-status" class="tab">
<div class="wrap" style="padding:15px">
<table id="tblStatus">
<thead>
<tr>
<th>Region</th>
<th>Total WO</th>
<th>Approved</th>
<th>Amount</th>
<th>FS Amount</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- ================= POPUP ================= -->
<div id="popup">
  <div class="popup-box">

    <h3>DETAIL WO</h3>

    <div class="popup-body">
      <table>
        <thead>
          <tr>
            <th>WO</th>
            <th>Status</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody id="popupBody"></tbody>
      </table>
    </div>

    <div class="popup-action">
      <button class="blue" onclick="closePopup()">CLOSE</button>
    </div>

  </div>
</div>

<!-- JS -->
<script src="../js/ikrlock.js"></script>
<script src="../js/dataims.js"></script>
<script src="../js/status.js"></script>

</body>
</html>
