<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEW IKR LOCK SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#0e0e0e;color:#fff;padding:18px}
h1{text-align:center}

.menu{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.menu button{background:#222;color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer}
.menu button.active{background:#8e44ad}

.toolbar{display:none;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.toolbar.active{display:flex}

button{padding:8px 12px;border:none;border-radius:6px;color:#fff;cursor:pointer;font-weight:bold}
.blue{background:#3498db}
.green{background:#2ecc71}
.red{background:#e74c3c}
.orange{background:#f39c12}
.gray{background:#555}

.tab{display:none}
.tab.active{display:block}

.wrap{overflow:auto;background:#171717;border-radius:10px;max-height:500px}
table{width:100%;border-collapse:collapse;min-width:1200px}
th,td{border:1px solid #333;padding:6px;font-size:12px;text-align:center}
th{background:#8e44ad;position:sticky;top:0}
.click{color:#00eaff;cursor:pointer}
</style>
</head>

<body>

<h1>NEW IKR LOCK SYSTEM</h1>

<div class="menu">
<button class="active" onclick="openTab('ikr',this)">DATA IKR LOCK</button>
<button onclick="openTab('ims',this)">DATA IMS</button>
<button onclick="openTab('pivot',this)">PIVOT</button>
<button onclick="openTab('status',this)">STATUS</button>
</div>

<!-- TOOLBAR IKR -->
<div id="toolbar-ikr" class="toolbar active">
<button class="blue" onclick="downloadIKR()">DOWNLOAD</button>
<input type="file" id="fileIKR" hidden>
<button class="orange" onclick="fileIKR.click()">UPLOAD IKR</button>
<button class="red" onclick="hapusIKR()">HAPUS</button>
</div>

<!-- TOOLBAR IMS -->
<div id="toolbar-ims" class="toolbar">
<button class="blue" onclick="downloadIMS()">DOWNLOAD</button>
<input type="file" id="fileIMS" hidden>
<button class="orange" onclick="fileIMS.click()">UPLOAD IMS</button>
<button class="red" onclick="hapusIMS()">HAPUS</button>
</div>

<!-- TOOLBAR PIVOT -->
<div id="toolbar-pivot" class="toolbar">
<button class="green" onclick="generatePivot()">REFRESH</button>
</div>

<!-- TOOLBAR STATUS -->
<div id="toolbar-status" class="toolbar">
<button class="green" onclick="generateStatus()">REFRESH</button>
</div>

<!-- TAB IKR -->
<div id="tab-ikr" class="tab active">
<div class="wrap">
<table id="tableIKR">
<thead>
<tr>
<th>No</th><th>Region</th><th>Tahun</th><th>Bulan</th><th>WO Type</th>
<th>Jumlah</th><th>Amount</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- TAB IMS -->
<div id="tab-ims" class="tab">
<div class="wrap">
<table id="tableIMS">
<thead>
<tr>
<th>No</th><th>City</th><th>Pra Invoice</th><th>Invoice</th><th>Job</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- TAB PIVOT -->
<div id="tab-pivot" class="tab">
<div class="wrap" style="padding:15px">
<canvas id="chartPivot"></canvas>
</div>
</div>

<!-- TAB STATUS -->
<div id="tab-status" class="tab">
<div class="wrap" style="padding:15px">
<table id="tableStatus">
<thead>
<tr>
<th>Region</th><th>Total WO</th><th>Amount</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<script src="../js/ikrlock.js"></script>
<script src="../js/dataims.js"></script>

</body>
</html>
