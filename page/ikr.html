<!-- page/ikr.html -->
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEW IKR LOCK</title>

<!-- LIB -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,Helvetica,sans-serif;
  background:#0e0e0e;
  color:#fff;
  padding:18px;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:18px;
}

/* MENU */
.menu{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.menu button{
  background:#222;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.menu button.active{
  background:#8e44ad;
}

/* TOOLBAR */
.toolbar{
  display:none;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.toolbar.active{
  display:flex;
}

button{
  border:none;
  padding:9px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  color:#fff;
}

.blue{background:#3498db;}
.green{background:#2ecc71;}
.red{background:#e74c3c;}
.orange{background:#f39c12;}
.purple{background:#8e44ad;}
.gray{background:#555;}

input[type="text"]{
  padding:9px;
  border:none;
  border-radius:8px;
  min-width:180px;
}

/* CONTENT */
.tab{
  display:none;
}

.tab.active{
  display:block;
}

/* TABLE */
.wrap{
  overflow:auto;
  max-height:560px;
  background:#171717;
  border:1px solid #333;
  border-radius:10px;
}

table{
  width:100%;
  min-width:1500px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #333;
  padding:7px;
  font-size:12px;
  text-align:center;
  white-space:nowrap;
}

th{
  background:#8e44ad;
  position:sticky;
  top:0;
  z-index:5;
}

tr:hover{
  background:#222;
}

.click{
  color:#00eaff;
  cursor:pointer;
  font-weight:bold;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.82);
  z-index:9999;
}

.popup-box{
  width:92%;
  max-width:900px;
  height:88vh;
  margin:25px auto;
  background:#111;
  border-radius:12px;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.popup-body{
  flex:1;
  overflow:auto;
  margin-top:10px;
}

.popup-action{
  display:flex;
  gap:10px;
  justify-content:flex-end;
  margin-top:10px;
}

/* MOBILE */
@media(max-width:768px){

  body{padding:10px;}

  h1{font-size:22px;}

  .menu button,
  button{
    font-size:12px;
    padding:8px 10px;
  }

  th,td{
    font-size:11px;
    padding:5px;
  }

  input[type="text"]{
    min-width:130px;
  }
}
</style>
</head>
<body>

<h1>🔒 NEW IKR LOCK</h1>

<!-- MENU -->
<div class="menu">
  <button class="active" onclick="openTab('ikr',this)">DATA IKR LOCK</button>
  <button onclick="openTab('ims',this)">DATA IMS</button>
  <button onclick="openTab('status',this)">PIVOT STATUS</button>
  <button class="green" onclick="uploadServerAll()">UPLD SERVER</button>
</div>

<!-- TOOLBAR IKR -->
<div id="toolbar-ikr" class="toolbar active">
  <button class="blue" onclick="downloadIKR()">DOWNLOAD EXCEL</button>

  <input type="file" id="fileIKR" hidden accept=".xlsx,.xls">
  <button class="orange" onclick="document.getElementById('fileIKR').click()">UPLD DATA</button>

  <button class="red" onclick="hapusIKR()">HAPUS</button>
</div>

<!-- TOOLBAR IMS -->
<div id="toolbar-ims" class="toolbar">
  <button class="blue" onclick="downloadIMS()">DOWNLOAD EXCEL</button>

  <input type="file" id="fileIMS" hidden accept=".xlsx,.xls">
  <button class="orange" onclick="document.getElementById('fileIMS').click()">UPLD IMS</button>

  <button class="red" onclick="hapusIMS()">HAPUS</button>

  <input type="text" id="searchPra" placeholder="Pra Invoice">
  <input type="text" id="searchInv" placeholder="Invoice Number">
  <input type="text" id="searchRegion" placeholder="Region">
</div>

<!-- TOOLBAR STATUS -->
<div id="toolbar-status" class="toolbar">
  <button class="green" onclick="generateStatus()">REFRESH STATUS</button>
  <button class="blue" onclick="downloadStatus()">DOWNLOAD STATUS</button>
</div>

<!-- TAB IKR -->
<div id="tab-ikr" class="tab active">
<div class="wrap">
<table id="tblIKR">
<thead>
<tr>
<th>No</th>
<th><input type="checkbox" id="checkIKR"></th>
<th>Region</th>
<th>Tahun</th>
<th>WO Type</th>
<th>Bulan</th>
<th>Jumlah WO</th>
<th>WO Approved</th>
<th>Amount</th>
<th>FS Amount</th>
<th>Remark</th>
<th>No Invoice</th>
<th>Note</th>
<th>Done</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- TAB IMS -->
<div id="tab-ims" class="tab">
<div class="wrap">
<table id="tblIMS">
<thead>
<tr>
<th>No</th>
<th><input type="checkbox" id="checkIMS"></th>
<th>City</th>
<th>Pra Invoice Number</th>
<th>Invoice Number</th>
<th>Jumlah WO</th>
<th>Job Name</th>
<th>Invoice Total</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- TAB STATUS -->
<div id="tab-status" class="tab">
<div class="wrap" style="padding:15px;max-height:none;">
<canvas id="chartStatus" height="120"></canvas>

<br><br>

<table id="tblStatus">
<thead>
<tr>
<th>No</th>
<th>Region</th>
<th>Total WO</th>
<th>Approved</th>
<th>Amount</th>
<th>FS Amount</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">

<h3 id="popupTitle">DETAIL</h3>

<div class="popup-body">
<table id="tblPopup">
<thead></thead>
<tbody></tbody>
</table>
</div>

<div class="popup-action">
<button class="blue" onclick="downloadPopup()">DOWNLOAD</button>
<button class="gray" onclick="closePopup()">CLOSE</button>
</div>

</div>
</div>

<!-- JS -->
<script src="../js/main.js"></script>
<script src="../js/ikrlock.js"></script>
<script src="../js/dataims.js"></script>
<script src="../js/status.js"></script>

</body>
</html>
