<!-- MENU -->
<div class="menu">

  <button class="active" onclick="openTab('ikr',this)">DATA IKR LOCK</button>
  <button onclick="openTab('ims',this)">DATA IMS</button>
  <button onclick="openTab('pivot',this)">PIVOT</button>
  <button onclick="openTab('status',this)">STATUS</button>

  <button class="green" onclick="uploadServerAll()">UPLOAD SERVER SEMUA</button>

</div>

<!-- TOOLBAR IKR -->
<div id="toolbar-ikr" class="toolbar active">
  <button class="blue" onclick="downloadIKR()">DOWNLOAD EXCEL</button>

  <input type="file" id="fileIKR" hidden>
  <button class="orange" onclick="fileIKR.click()">UPLOAD DATA</button>

  <button class="red" onclick="hapusIKR()">HAPUS</button>
</div>

<!-- TOOLBAR IMS -->
<div id="toolbar-ims" class="toolbar">
  <button class="blue" onclick="downloadIMS()">DOWNLOAD EXCEL</button>

  <input type="file" id="fileIMS" hidden>
  <button class="orange" onclick="fileIMS.click()">UPLOAD IMS</button>

  <button class="red" onclick="hapusIMS()">HAPUS</button>
</div>

<!-- TOOLBAR PIVOT -->
<div id="toolbar-pivot" class="toolbar">
  <button class="green" onclick="generatePivot()">REFRESH</button>
</div>

<!-- TOOLBAR STATUS -->
<div id="toolbar-status" class="toolbar">
  <button class="green" onclick="generateStatus()">REFRESH</button>
</div>

<!-- TAB IKR -->
<div id="tab-ikr" class="tab active">
  <div class="wrap">
    <table id="tblIKR">
      <thead>
        <tr>
          <th>No</th>
          <th><input type="checkbox" id="checkIKR"></th>
          <th>Region</th>
          <th>Tahun</th>
          <th>WO Type</th>
          <th>Bulan</th>
          <th>Jumlah WO</th>
          <th>Approved</th>
          <th>Amount</th>
          <th>FS Amount</th>
          <th>Remark</th>
          <th>Invoice</th>
          <th>Note</th>
          <th>Done</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- TAB IMS -->
<div id="tab-ims" class="tab">
  <div class="wrap">
    <table id="tblIMS">
      <thead>
        <tr>
          <th>No</th>
          <th><input type="checkbox"></th>
          <th>City</th>
          <th>Pra Invoice</th>
          <th>Invoice</th>
          <th>Jumlah WO</th>
          <th>Job Name</th>
          <th>Invoice Total</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- TAB PIVOT -->
<div id="tab-pivot" class="tab">
  <div class="wrap" style="padding:15px">
    <canvas id="chartPivot"></canvas>
  </div>
</div>

<!-- TAB STATUS -->
<div id="tab-status" class="tab">
  <div class="wrap" style="padding:15px">
    <table id="tblStatus">
      <thead>
        <tr>
          <th>Region</th>
          <th>Total WO</th>
          <th>Approved</th>
          <th>Amount</th>
          <th>FS Amount</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- POPUP -->
<div id="popup" style="display:none">
  <div class="popup-box">
    <h3>DETAIL</h3>

    <div class="popup-body">
      <table>
        <thead>
          <tr>
            <th>WO</th>
            <th>Status</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody id="popupBody"></tbody>
      </table>
    </div>

    <div class="popup-action">
      <button onclick="closePopup()">CLOSE</button>
    </div>
  </div>
</div>
