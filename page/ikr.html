<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 FIX GITHUB -->
<base href="/tracking/">

<title>ALL TREKING FS</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  padding:20px;
}

.menu button{
  padding:10px;
  margin-right:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#2c2c2c;
  color:#fff;
}
.menu button.active{
  background:#8e44ad;
}

.tab{display:none;}
.tab.active{display:block;}

.table-wrap{
  overflow:auto;
  background:#1c1c1c;
  border-radius:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:6px;
  font-size:12px;
  text-align:center;
  border-bottom:1px solid #333;
}

thead{
  background:#8e44ad;
}
</style>
</head>

<body>

<h2>📊 ALL TREKING FS</h2>

<div class="menu">
  <button onclick="showTab('data',this)" class="active">Data</button>
  <button onclick="showTab('pivot',this)">Pivot</button>
  <button onclick="showTab('ikr',this)">IKCR</button>
</div>

<!-- DATA -->
<div id="data" class="tab active">
  <button onclick="triggerUpload()">Upload</button>
  <input type="file" id="upload" hidden>

  <div class="table-wrap">
    <table id="tableData">
      <thead>
        <tr>
          <th>No</th>
          <th>WO</th>
          <th>Area</th>
          <th>Bulan</th>
          <th>STB</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- PIVOT -->
<div id="pivot" class="tab">
  <button onclick="setPivot('area',this)">Area</button>
  <button onclick="setPivot('bulan',this)">Bulan</button>

  <div class="table-wrap">
    <table id="pivotTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- IKCR -->
<div id="ikr" class="tab">
  <button onclick="triggerUploadIKR()">Upload</button>

  <input type="file" id="uploadIKR" hidden>

  <div class="table-wrap">
    <table id="tableIKR">
      <thead>
        <tr>
          <th>No</th>
          <th>Region</th>
          <th>Tahun</th>
          <th>WO Type</th>
          <th>Bulan</th>
          <th>Jumlah WO</th>
          <th>WO Approved</th>
          <th>Amount</th>
          <th>FS Amount</th>
          <th>Selisih</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- 🔥 FIX PATH LANGSUNG -->
<script src="js/ikrlock.js"></script>

</body>
</html>
