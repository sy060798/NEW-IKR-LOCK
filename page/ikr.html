<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IKCR LOCK</title>

<!-- LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:#0f0f0f;
  color:#fff;
}

h2{
  margin:0 0 15px;
  text-align:center;
  font-size:26px;
}

/* MENU + BUTTON */
.menu,
.btn-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

button{
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  color:#fff;
  font-weight:bold;
  transition:.2s;
}

button:hover{
  opacity:.9;
  transform:translateY(-1px);
}

.menu button{
  background:#2a2a2a;
}

.menu button.active,
.purple{
  background:#8e44ad;
}

.blue{background:#3498db;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.green{background:#2ecc71;}

/* INFO TEXT */
.info-upload{
  width:100%;
  font-size:12px;
  opacity:.75;
  margin-top:-8px;
  margin-bottom:5px;
}

/* TABLE */
.table-wrap{
  overflow:auto;
  max-height:520px;
  background:#1b1b1b;
  border:1px solid #444;
  border-radius:8px;
}

table{
  width:100%;
  min-width:1300px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #333;
  padding:6px;
  font-size:12px;
  text-align:center;
  white-space:nowrap;
}

thead th{
  background:#8e44ad;
  position:sticky;
  top:0;
  z-index:5;
}

tbody tr:hover{
  background:#252525;
}

td[contenteditable="true"]{
  background:#181818;
}

td[contenteditable="true"]:focus{
  outline:none;
  background:#262626;
}

/* TAB */
.tab{
  display:none;
}

.tab.active{
  display:block;
}

/* POPUP */
#popupWO{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.82);
  z-index:9999;
}

.popup-box{
  width:90%;
  max-width:850px;
  height:500px;
  margin:30px auto;
  background:#111;
  border-radius:10px;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.popup-body{
  flex:1;
  overflow:auto;
  margin-top:10px;
}

.popup-action{
  display:flex;
  gap:10px;
  justify-content:flex-end;
  margin-top:10px;
}

/* LOADING */
#loadingBox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:99999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.loader{
  width:55px;
  height:55px;
  border:5px solid #444;
  border-top:5px solid #8e44ad;
  border-radius:50%;
  animation:spin .8s linear infinite;
}

.loadingText{
  margin-top:12px;
  font-size:14px;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* MOBILE */
@media(max-width:768px){

  body{
    padding:10px;
  }

  h2{
    font-size:22px;
  }

  button{
    font-size:12px;
    padding:7px 10px;
  }

  th,td{
    font-size:11px;
    padding:5px;
  }

  .popup-box{
    width:95%;
    height:90vh;
  }

  .info-upload{
    font-size:11px;
  }
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingBox">
  <div class="loader"></div>
  <div class="loadingText" id="loadingText">Loading...</div>
</div>

<!-- POPUP DETAIL -->
<div id="popupWO">
  <div class="popup-box">

    <h3 style="margin:0">Detail WO</h3>

    <div class="popup-body">
      <table id="tblDetail">
        <thead>
          <tr>
            <th>WO Number</th>
            <th>Reference</th>
            <th>Quotation</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="popup-action">
      <button class="blue" onclick="downloadDetail()">Download</button>
      <button style="background:#444" onclick="closePopup()">Close</button>
    </div>

  </div>
</div>

<h2>🔒 IKCR LOCK</h2>

<!-- MENU -->
<div class="menu">
  <button class="active" onclick="showTab('data',this)">Data</button>
  <button onclick="showTab('pivot',this)">Pivot</button>
  <button onclick="showTab('status',this);generateStatus()">Status</button>
</div>

<!-- BUTTON -->
<div class="btn-group">
  <button class="blue" onclick="download()">Download</button>
  <button class="orange" onclick="triggerUpload()">Upload Data</button>
  <button class="purple" onclick="triggerUploadIMS()">Upload IMS</button>
  <button class="green" onclick="uploadServer()">Upload Server</button>
  <button class="red" onclick="hapusData()">Hapus</button>

  <input type="file" id="file" hidden accept=".xlsx,.xls">
  <input type="file" id="fileIMS" hidden accept=".xlsx,.xls">
</div>

<div class="info-upload">
  Upload Data = file utama | Upload IMS = update approved / invoice
</div>

<!-- DATA -->
<div id="data" class="tab active">
  <div class="table-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th>No</th>
          <th><input type="checkbox" id="checkAll"></th>
          <th>Region</th>
          <th>Tahun</th>
          <th>WO Type</th>
          <th>Bulan</th>
          <th>Jumlah WO</th>
          <th>WO Approved</th>
          <th>Amount</th>
          <th>FS Amount</th>
          <th>Selisih</th>
          <th>Remark</th>
          <th>No Invoice</th>
          <th>Note</th>
          <th>Done</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- PIVOT -->
<div id="pivot" class="tab">
  <div class="table-wrap" style="padding:15px;max-height:none">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- STATUS -->
<div id="status" class="tab">
  <div class="table-wrap">
    <table id="tblStatus">
      <thead>
        <tr>
          <th>No</th>
          <th>Jenis</th>
          <th>Tahun</th>
          <th>Total WO Approved</th>
          <th>Total Invoice</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <br>

  <button class="green" onclick="downloadStatus()">
    Download Status
  </button>
</div>

<!-- SCRIPT -->
<script src="../js/ikrlock.js"></script>
<script src="../js/status.js"></script>

</body>
</html>
